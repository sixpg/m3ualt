<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JioTV+ Web</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#05080f;
  --card:rgba(255,255,255,.08);
  --border:rgba(255,255,255,.18);
  --text:#fff;
  --accent:#1da1ff;
}
*{box-sizing:border-box}
body{
  margin:0;
  background:var(--bg);
  font-family:system-ui,Arial;
  color:var(--text);
  height:100vh;
  overflow:hidden;
}

header{
  height:56px;
  display:flex;
  align-items:center;
  padding:0 18px;
  background:rgba(0,0,0,.65);
  border-bottom:1px solid var(--border);
}
header img{height:30px}

.container{
  display:flex;
  height:calc(100vh - 56px);
}

aside{
  width:260px;
  padding:14px;
  background:rgba(0,0,0,.45);
  border-right:1px solid var(--border);
  overflow-y:auto;
}

.cat{
  padding:14px;
  border-radius:14px;
  display:flex;
  justify-content:space-between;
  cursor:pointer;
}
.cat:hover,.cat.active{
  background:var(--card);
  outline:2px solid var(--accent);
}
.count{opacity:.7}

main{
  flex:1;
  padding:14px;
  overflow-y:auto;
}

.controls{
  display:flex;
  gap:10px;
  margin-bottom:14px;
}
.controls input,.controls select{
  padding:14px;
  border-radius:14px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--text);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:16px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:14px;
  cursor:pointer;
}
.card:hover{outline:2px solid var(--accent)}

.logo{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.logo img{max-height:70px;max-width:100%}

.name{text-align:center;font-size:14px;margin-top:8px}

@media(max-width:768px){
  .container{flex-direction:column}
  aside{width:100%;display:flex;overflow-x:auto}
  .cat{flex:0 0 auto}
}
</style>
</head>

<body>

<header>
  <img src="assets/logo.png" alt="JioTV+">
</header>

<div class="container">
  <aside id="categories"></aside>

  <main>
    <div class="controls">
      <input id="search" placeholder="Search channels…">
      <select id="quality">
        <option value="all">All</option>
        <option value="hd">HD</option>
        <option value="sd">SD</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
/* ===== PLAYLIST ===== */
const M3U_URL =
  "https://raw.githubusercontent.com/alex8875/m3u/refs/heads/main/jtv.m3u";

/* ===== FIXED JIOTV CATEGORY ORDER ===== */
const CATEGORY_ORDER = [
  "All Channels",
  "Jiostar",
  "Business News",
  "Entertainment",
  "Infotainment",
  "Lifestyle",
  "Kids",
  "News",
  "Devotional",
  "Movies",
  "Music",
  "Sports",
  "Educational"
];

/* ===== GROUP NORMALIZATION MAP ===== */
const CATEGORY_MAP = {
  "jiostar": "Jiostar",
  "business": "Business News",
  "business news": "Business News",
  "entertainment": "Entertainment",
  "infotainment": "Infotainment",
  "lifestyle": "Lifestyle",
  "kids": "Kids",
  "news": "News",
  "devotional": "Devotional",
  "movies": "Movies",
  "music": "Music",
  "sports": "Sports",
  "education": "Educational",
  "educational": "Educational"
};

let channels = [], currentCat = "All Channels";

/* ===== LOAD PLAYLIST ===== */
fetch(M3U_URL)
  .then(r => r.text())
  .then(parseM3U);

function normalizeCategory(raw){
  if(!raw) return "Entertainment";
  const key = raw.toLowerCase();
  return CATEGORY_MAP[key] || "Entertainment";
}

function parseM3U(data){
  const lines = data.split("\n");
  let c = {};

  lines.forEach(line=>{
    line = line.trim();

    if(line.startsWith("#EXTINF")){
      const idMatch = line.match(/tvg-id="([^"]*)"/);
      const name = line.split(",").pop().trim();
      const rawGroup = (line.match(/group-title="([^"]+)"/)||[])[1];

      c = {
        id: idMatch && idMatch[1] ? idMatch[1] : name,
        name: name,
        logo: (line.match(/tvg-logo="([^"]+)"/)||[])[1] || "",
        category: normalizeCategory(rawGroup),
        quality: /hd/i.test(name) ? "hd" : "sd"
      };
    }

    if(line.startsWith("http")){
      c.url = line;
      channels.push(c);
    }
  });

  buildCategories();
  render();
}

/* ===== SIDEBAR ===== */
function buildCategories(){
  const box = document.getElementById("categories");
  box.innerHTML = "";

  CATEGORY_ORDER.forEach((cat, i)=>{
    const count = cat === "All Channels"
      ? channels.length
      : channels.filter(c=>c.category===cat).length;

    if(count === 0 && cat !== "All Channels") return;

    const d = document.createElement("div");
    d.className = "cat" + (i===0 ? " active" : "");
    d.innerHTML = `<span>${cat}</span><span class="count">${count}</span>`;
    d.onclick = ()=>{
      currentCat = cat;
      document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
      d.classList.add("active");
      render();
    };
    box.appendChild(d);
  });
}

/* ===== GRID ===== */
function render(){
  const grid = document.getElementById("grid");
  const q = document.getElementById("search").value.toLowerCase();
  const qual = document.getElementById("quality").value;
  grid.innerHTML = "";

  channels.filter(c=>{
    if(currentCat!=="All Channels" && c.category!==currentCat) return false;
    if(qual!=="all" && c.quality!==qual) return false;
    if(!c.name.toLowerCase().includes(q)) return false;
    return true;
  }).forEach(c=>{
    const d = document.createElement("div");
    d.className = "card";
    d.innerHTML = `
      <div class="logo"><img src="${c.logo}" loading="lazy"></div>
      <div class="name">${c.name}</div>
    `;
    d.onclick = ()=>{
      location.href = "player.html?id=" + encodeURIComponent(c.id);
    };
    grid.appendChild(d);
  });
}

document.getElementById("search").oninput = render;
document.getElementById("quality").onchange = render;
</script>

</body>
</html>
